<!doctype html>
<html lang="en-us">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            min-height: 100vh;
            background-color: #111;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            image-rendering: pixelated;
            scrollbar-width: none;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            width: 100vw;
            height: 100vh;
        }

        #controls {
            margin-left: 1em;
            display: flex;
            align-items: center;
        }

        #controller,
        #dmca {
            padding-left: 4em;
        }

        #popup {
            position: absolute;
        }
    </style>
</head>

<body>
    <div id="popup">
        <button id="thebutton" onclick="closeLeftMenu();">Close</button>
        <div id="keyboard">
            <h2>Keyboard Controls</h2>
            <ul>
                <li>Movement: WASD</li>
                <li>A: L</li>
                <li>B: , (Comma Button/Less Than Button)</li>
                <li>L: R-Shift</li>
                <li>Z: K</li>
                <li>Start: Space</li>
                <li>C-stick: Arrow Keys</li>
            </ul>
        </div>
    </div>
    <div id="container">
        <canvas class="emscripten" id="canvas"></canvas>
    </div>
    <script>
        function openLeftMenu() {
          document.getElementById("keyboard").style.display = "block";
          document.getElementById("thebutton").innerHTML = "Close";
          document.getElementById("thebutton").onclick = function() {
            closeLeftMenu();
          };
        }

        function closeLeftMenu() {
          document.getElementById("keyboard").style.display = "none";
          document.getElementById("thebutton").innerHTML = "Open"
          document.getElementById("thebutton").onclick = function() {
            openLeftMenu();
          };
        }
    </script>

                    console.log(text);
                };
            })(),
            printErr: function(text) {
                if (arguments.length > 1)
                    text = Array.prototype.slice.call(arguments).join(' ');
                console.error(text);
            },
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                canvas.width = window.innerWidth; // Todo: how to do this from c++
                canvas.height = window.innerHeight;
                canvas.addEventListener("webglcontextlost", function(e) {
                    alert('WebGL context lost. You will need to reload the page.');
                    e.preventDefault();
                }, false);
                return canvas;
            })(),
            setStatus: function(text) {}
        };
