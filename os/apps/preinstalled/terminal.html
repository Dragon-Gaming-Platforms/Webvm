<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0d0d;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            font-family: 'Cascadia Code', 'Courier New', monospace;
        }

        .terminal-toolbar {
            background: #1a1a1a;
            border-bottom: 1px solid rgba(255, 0, 0, 0.2);
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .terminal-toolbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .terminal-badge {
            background: linear-gradient(90deg, #8a0000, #ff1a1a);
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .terminal-status {
            font-size: 11px;
            color: #666;
            font-family: monospace;
        }

        .terminal-status.ready {
            color: #00ff88;
        }

        .terminal-status.loading {
            color: #ffaa00;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .toolbar-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }

        .toolbar-btn:hover {
            background: rgba(255, 0, 0, 0.2);
            border-color: rgba(255, 0, 0, 0.4);
            color: white;
        }

        #loading-screen {
            position: absolute;
            top: 36px;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0d0d0d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            gap: 20px;
        }

        .loading-logo {
            font-size: 48px;
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.8));
        }

        .loading-title {
            font-size: 18px;
            font-weight: bold;
            color: #ff2e2e;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
            font-family: monospace;
        }

        .loading-subtitle {
            font-size: 12px;
            color: #666;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .loading-bar-container {
            width: 300px;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, #8a0000, #ff1a1a);
            border-radius: 3px;
            animation: loadProgress 3s ease forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            30% { width: 40%; }
            60% { width: 70%; }
            90% { width: 90%; }
            100% { width: 95%; }
        }

        .loading-log {
            font-family: monospace;
            font-size: 11px;
            color: #444;
            text-align: center;
            height: 60px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .loading-log span.active {
            color: #00ff88;
        }

        #terminal-container {
            flex: 1;
            overflow: hidden;
            display: none;
            padding: 4px;
            background: #0d0d0d;
        }

        #terminal-container.visible {
            display: block;
        }

        .xterm {
            height: 100%;
            padding: 8px;
        }

        .xterm-viewport {
            background: #0d0d0d !important;
        }

        #error-screen {
            position: absolute;
            top: 36px;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0d0d0d;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        #error-screen.visible {
            display: flex;
        }

        .error-icon {
            font-size: 40px;
        }

        .error-title {
            color: #ff2e2e;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
        }

        .error-msg {
            color: #666;
            font-size: 12px;
            font-family: monospace;
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
        }

        .error-retry {
            background: linear-gradient(90deg, #8a0000, #ff1a1a);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 12px;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .error-retry:hover {
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
    </style>

    <link rel="stylesheet" href="/xterm/xterm.css">
    <script src="/xterm/xterm.js"></script>
    <script src="/xterm/xterm-addon-fit.js"></script>
    <script src="https://cxrtnc.leaningtech.com/1.0.6/cx.js"></script>
</head>
<body>

    <div class="terminal-toolbar">
        <div class="terminal-toolbar-left">
            <div class="terminal-badge">DragonOS Terminal</div>
            <div class="terminal-status loading" id="status-text">
                Initializing...
            </div>
        </div>
        <div class="terminal-toolbar-right">
            <button class="toolbar-btn" onclick="clearTerminal()">Clear</button>
            <button class="toolbar-btn" onclick="restartTerminal()">Restart</button>
        </div>
    </div>

    <div id="loading-screen">
        <div class="loading-logo">🐉</div>
        <div class="loading-title">DragonOS Terminal</div>
        <div class="loading-subtitle">Powered by WebVM + CheerpX</div>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <div class="loading-log" id="loading-log">
            <span id="log1">Initializing CheerpX engine...</span>
            <span id="log2">Loading filesystem...</span>
            <span id="log3">Starting Linux kernel...</span>
            <span id="log4">Launching bash...</span>
        </div>
    </div>

    <div id="error-screen">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Terminal Failed To Start</div>
        <div class="error-msg" id="error-msg">
            Could not initialize WebVM.
        </div>
        <button class="error-retry" onclick="restartTerminal()">Retry</button>
    </div>

    <div id="terminal-container"></div>

    <script>
        let term = null;
        let fitAddon = null;
        let cx = null;
        let isReady = false;

        const logSteps = ['log1', 'log2', 'log3', 'log4'];
        let currentStep = 0;

        function advanceLoadingStep() {
            if (currentStep > 0) {
                const prev = document.getElementById(logSteps[currentStep - 1]);
                if (prev) prev.style.color = '#00ff88';
            }
            if (currentStep < logSteps.length) {
                const curr = document.getElementById(logSteps[currentStep]);
                if (curr) curr.classList.add('active');
                currentStep++;
            }
        }

        function setStatus(text, type) {
            const el = document.getElementById('status-text');
            el.innerText = text;
            el.className = 'terminal-status ' + type;
        }

        function showError(msg) {
            document.getElementById('loading-screen').style.display = 'none';
            const err = document.getElementById('error-screen');
            err.classList.add('visible');
            document.getElementById('error-msg').innerText = msg;
            setStatus('Error', '');
        }

        function showTerminal() {
            document.getElementById('loading-screen').style.display = 'none';
            const container = document.getElementById('terminal-container');
            container.classList.add('visible');
            setStatus('Ready', 'ready');
            isReady = true;
            if (fitAddon) fitAddon.fit();
        }

        function initTerminal() {
            const container = document.getElementById('terminal-container');

            term = new Terminal({
                cursorBlink: true,
                cursorStyle: 'block',
                fontSize: 14,
                fontFamily: "'Cascadia Code', 'Courier New', monospace",
                theme: {
                    background: '#0d0d0d',
                    foreground: '#f0f0f0',
                    cursor: '#ff2e2e',
                    cursorAccent: '#0d0d0d',
                    selection: 'rgba(255, 46, 46, 0.3)',
                    black: '#0d0d0d',
                    red: '#ff2e2e',
                    green: '#00ff88',
                    yellow: '#ffaa00',
                    blue: '#0078D4',
                    magenta: '#cc44ff',
                    cyan: '#00ccff',
                    white: '#f0f0f0',
                    brightBlack: '#444444',
                    brightRed: '#ff6666',
                    brightGreen: '#66ffaa',
                    brightYellow: '#ffcc44',
                    brightBlue: '#4499ff',
                    brightMagenta: '#dd88ff',
                    brightCyan: '#44ddff',
                    brightWhite: '#ffffff',
                },
                allowTransparency: true,
                scrollback: 1000,
            });

            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(container);
            fitAddon.fit();

            window.addEventListener('resize', () => {
                if (fitAddon) fitAddon.fit();
            });

            return term;
        }

        async function startWebVM() {
            try {
                advanceLoadingStep();
                setStatus('Loading CheerpX...', 'loading');

                initTerminal();

                advanceLoadingStep();
                setStatus('Loading filesystem...', 'loading');

                // Find the latest ext2 image
                const imageUrl = await findLatestImage();

                cx = await CheerpX.Linux.create({
                    mounts: [
                        { type: "ext2", url: imageUrl, mountpoint: "/" },
                        { type: "devs", mountpoint: "/dev" },
                        { type: "proc", mountpoint: "/proc" },
                        { type: "dir", mountpoint: "/tmp" }
                    ],
                    networkInterface: null,
                });

                advanceLoadingStep();
                setStatus('Starting Linux...', 'loading');

                cx.setConsole(term);

                advanceLoadingStep();
                setStatus('Launching bash...', 'loading');

                showTerminal();

                await cx.run("/bin/bash", ["--login"], {
                    env: [
                        "HOME=/home/user",
                        "TERM=xterm",
                        "USER=user",
                        "SHELL=/bin/bash",
                        "EDITOR=vim",
                        "LANG=en_US.UTF-8",
                        "LC_ALL=C",
                        "PATH=/home/user/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
                    ],
                    cwd: "/home/user",
                    uid: 1000,
                    gid: 1000,
                });

            } catch (err) {
                console.error("WebVM Error:", err);
                showError("Failed to start terminal:\n" + err.message);
            }
        }

        async function findLatestImage() {
            // Try to find the ext2 image
            const possibleNames = [
                '/debian_mini_LATEST.ext2',
                // Add the actual filename after first deploy
            ];

            for (const name of possibleNames) {
                try {
                    const response = await fetch(name, { method: 'HEAD' });
                    if (response.ok) return name;
                } catch (e) {
                    continue;
                }
            }

            // If none found, throw error with helpful message
            throw new Error(
                "Could not find WebVM image. " +
                "Make sure the WebVM workflow has run successfully."
            );
        }

        function clearTerminal() {
            if (term) term.clear();
        }

        function restartTerminal() {
            document.getElementById('error-screen').classList.remove('visible');
            document.getElementById('terminal-container').classList.remove('visible');
            document.getElementById('loading-screen').style.display = 'flex';

            currentStep = 0;
            logSteps.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.remove('active');
                    el.style.color = '';
                }
            });

            isReady = false;
            cx = null;

            setTimeout(startWebVM, 500);
        }

        window.addEventListener('load', () => {
            startWebVM();
        });
    </script>
</body>
</html>
